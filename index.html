<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>911 元宇宙：棋局星河</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020206;
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            user-select: none; -webkit-user-select: none;
        }
        #webgl-stage {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        
        /* 天色變黑動態遮罩層 */
        #sky-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; background: rgba(0, 0, 0, 0);
            pointer-events: none; 
            transition: background 0.5s ease;
        }

        /* 🎯 右上角極簡圓形音樂按鈕 */
        #audio-toggle-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(10, 10, 25, 0.85); color: #ff007f;
            border: 2px solid #ff007f; width: 45px; height: 45px;
            font-size: 18px; font-weight: bold; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            outline: none;
        }
        #audio-toggle-btn:hover {
            box-shadow: 0 0 25px #ff007f;
            transform: scale(1.08);
        }

        /* 全螢幕打字機黑客幕 */
        #typewriter-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; background: rgba(2, 2, 8, 0.95);
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; padding: 30px;
        }
        #typewriter-text {
            color: #00ff9d; font-family: monospace, "Microsoft JhengHei";
            font-size: 18px; font-weight: bold; line-height: 1.8;
            white-space: pre-wrap; word-break: break-all;
            max-width: 500px; width: 100%; text-align: left;
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
            border-right: 2px solid #00ff9d;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { border-color: transparent; } }

        #ui-container {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            width: 90%; max-width: 600px; text-align: center;
        }
        .system-announcement {
            background: rgba(10, 10, 25, 0.85);
            border: 2px solid #00ff9d; color: #00ff9d;
            padding: 12px; font-weight: bold; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,255,157,0.3);
            margin-bottom: 10px; font-size: 14px;
            pointer-events: none;
        }
        .timer-box {
            background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 8px 15px; display: inline-block;
            border-radius: 20px; font-size: 14px; border: 1px solid #ff007f;
            pointer-events: none;
        }
        #countdown { font-weight: bold; color: #ff007f; text-shadow: 0 0 5px #ff007f; }
        
        /* 3D 星球搜尋終端機 UI */
        #search-container {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #00ff9d; padding: 10px 15px;
            border-radius: 30px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            display: flex; align-items: center; width: 85%; max-width: 400px;
        }
        #search-input {
            background: transparent; border: none; color: #fff;
            font-size: 16px; width: 100%; outline: none;
            padding: 5px; font-family: monospace;
        }
        #search-input::placeholder { color: rgba(0, 255, 157, 0.5); }
        #search-btn {
            background: #00ff9d; border: none; color: #000;
            padding: 8px 18px; border-radius: 20px; font-weight: bold;
            cursor: pointer; font-size: 14px; box-shadow: 0 0 10px #00ff9d;
            white-space: nowrap;
        }
        #search-btn:hover { background: #fff; box-shadow: 0 0 15px #00ff9d; }

        /* 手機版虛擬搖桿 */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 110px; height: 110px; background: rgba(255,255,255,0.08);
            border-radius: 50%; z-index: 10; border: 1px solid rgba(255,255,255,0.2);
            touch-action: none; display: block;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 40px; height: 40px; background: #00ff9d;
            border-radius: 50%; box-shadow: 0 0 12px #00ff9d;
        }
        
        .hidden { display: none !important; }
        
        /* 測試用手動引爆按鈕 */
        #test-btn {
            position: absolute; top: 180px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: #ff007f; color: #fff; border: none; 
            padding: 12px 25px; font-weight: bold; font-size: 16px;
            border-radius: 25px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px #ff007f;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
</head>
<body>

    <canvas id="webgl-stage"></canvas>
    <div id="sky-mask"></div>

    <button id="audio-toggle-btn" onclick="toggleAudioSystem()">🎵</button>

    <div id="typewriter-screen" class="hidden">
        <div id="typewriter-text"></div>
    </div>

    <button id="test-btn" onclick="triggerMemoryBlast()">💥 測試直接引爆（看煙火與星球）</button>

    <div id="ui-container">
        <div class="system-announcement" id="announcement">
            🌐 正在建立 911 圍棋元宇宙安全連線...
        </div>
        <div class="timer-box" id="timer-box">
            距離記憶棋局大爆炸還有：<span id="countdown">00:00:00</span>
        </div>
    </div>

    <div id="search-container" class="hidden">
        <input type="text" id="search-input" placeholder="輸入座號(如:01)或姓名定位星星...">
        <button id="search-btn" onclick="searchMyStar()">LOCATE</button>
    </div>

    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>

    <script>
        // === 🎵 音樂與音效控制通道 ===
        const audioWorld = new Audio('bgm_world.mp3'); audioWorld.loop = true; audioWorld.volume = 0.6;
        const audioTicking = new Audio('ticking.mp3'); audioTicking.loop = true; audioTicking.volume = 0.4;
        const audioPiano = new Audio('bgm_piano.mp3'); audioPiano.loop = true; audioPiano.volume = 0.7;

        let isTickingPlaying = false;
        let isAudioPlaying = true;    // 預設設定為「開啟音樂」狀態
        let isAudioUnlocked = false;   // 標記音訊通道是否已被解鎖放行

        // === 0.0 進入網頁前問姓名座號 ===
        let myUsername = prompt("【911 限定】請輸入你的座號或名字或綽號", "");
        if(!myUsername || myUsername.trim() === "") {
            myUsername = "棋手_" + Math.floor(Math.random() * 900 + 100);
        }

        // 🎯 全域自動啟動播放器
        function autoStartAudioSystem() {
            if (!isAudioUnlocked && isAudioPlaying) {
                isAudioUnlocked = true;
                if (blastStage === 0) {
                    audioWorld.play().catch(e => console.log("等待放行:", e));
                    if (isTickingPlaying) audioTicking.play().catch(e => console.log(e));
                } else {
                    audioPiano.play().catch(e => console.log(e));
                }
                updateAudioButtonUI(true);
                window.removeEventListener('click', autoStartAudioSystem);
                window.removeEventListener('touchstart', autoStartAudioSystem);
            }
        }
        window.addEventListener('click', autoStartAudioSystem);
        window.addEventListener('touchstart', autoStartAudioSystem, { passive: true });

        // 🎯 右上角極簡按鈕手動控制切換
        function toggleAudioSystem() {
            if (!isAudioPlaying) {
                isAudioPlaying = true;
                isAudioUnlocked = true; 
                if (blastStage === 0) {
                    audioWorld.play().catch(e => console.log(e));
                    if (isTickingPlaying) audioTicking.play().catch(e => console.log(e));
                } else {
                    audioPiano.play().catch(e => console.log(e));
                }
                updateAudioButtonUI(true);
            } else {
                audioWorld.pause(); audioTicking.pause(); audioPiano.pause();
                isAudioPlaying = false;
                updateAudioButtonUI(false);
            }
        }

        // 🎯 極簡圖示與外觀切換控制
        function updateAudioButtonUI(isPlaying) {
            const btn = document.getElementById('audio-toggle-btn');
            if (btn) {
                if (isPlaying) {
                    btn.innerHTML = "🎵"; // 播放中顯示五線譜
                    btn.style.borderColor = "#ff007f"; btn.style.color = "#ff007f";
                    btn.style.boxShadow = "0 0 15px rgba(255, 0, 127, 0.3)";
                } else {
                    btn.innerHTML = "🔇"; // 靜音中顯示靜音符號
                    btn.style.borderColor = "#00ff9d"; btn.style.color = "#00ff9d";
                    btn.style.boxShadow = "0 0 15px rgba(0, 255, 157, 0.3)";
                }
            }
        }

        // === 0.1 911 畢業班級名單與專屬祝福資料庫 ===
        const graduationData = [
            { id: "star_01", seat: "01", name: "王群叡", wish: "畢業快樂🎉" },
            { id: "star_03", seat: "03", name: "吳沁璇", wish: "畢業快樂🎉" },
            { id: "star_04", seat: "04", name: "洪可芸", wish: "畢業快樂🎉" },
            { id: "star_06", seat: "06", name: "陳俞瑾", wish: "畢業快樂🎉" },
            { id: "star_07", seat: "07", name: "陳晏秦", wish: "畢業快樂🎉" },
            { id: "star_08", seat: "08", name: "楊善茹", wish: "畢業快樂🎉" },
            { id: "star_21", seat: "21", name: "丁日初", wish: "畢業快樂🎉" },
            { id: "star_22", seat: "22", name: "王宥淵", wish: "畢業快樂🎉" },
            { id: "star_23", seat: "23", name: "李宣毅", wish: "畢業快樂🎉" },
            { id: "star_24", seat: "24", name: "林秉豫", wish: "畢業快樂🎉" },
            { id: "star_25", seat: "25", name: "吳少珷", wish: "畢業快樂🎉" },
            { id: "star_26", seat: "26", name: "林延宥", wish: "延宥！雖然只帶你半學期，但你的學習與吸收能力驚人。未來的路上保持這份自信，勇敢 Debug 你的人生藍圖吧！" },
            { id: "star_27", seat: "27", name: "徐亦祺", wish: "畢業快樂🎉" },
            { id: "star_28", seat: "28", name: "陳又嘉", wish: "畢業快樂🎉" },
            { id: "star_29", seat: "29", name: "陳品聿", wish: "畢業快樂🎉" },
            { id: "star_30", seat: "30", name: "陳彥希", wish: "畢業快樂🎉" },
            { id: "star_31", seat: "31", name: "陳楷育", wish: "畢業快樂🎉" },
            { id: "star_33", seat: "33", name: "陳俊穎", wish: "畢業快樂🎉" },
            { id: "star_34", seat: "34", name: "陳謙維", wish: "畢業快樂🎉" },
            { id: "star_35", seat: "35", name: "黃唯軒", wish: "畢業快樂🎉" },
            { id: "star_36", seat: "36", name: "梁普恩", wish: "畢業快樂🎉" },
            { id: "star_37", seat: "37", name: "許洺齊", wish: "洺齊！這段時間看見你的成長，老師真的覺得你是有潛力的一顆星。記住，你的大腦核心處理器非常強大，相信自己，未來必定大放異彩！" },
            { id: "star_38", seat: "38", name: "蔡易辰", wish: "易辰！人生不要害怕遭遇 Compile Error，每一次的挫折與挑戰，都是讓你系統變得更完美的優化擴充。祝你未來一路順暢！" },
            { id: "star_39", seat: "39", name: "楊予寬", wish: "畢業快樂🎉" },
            { id: "star_40", seat: "40", name: "楊淞賁", wish: "畢業快樂🎉" },
            { id: "star_41", seat: "41", name: "劉品樂", wish: "畢業快樂🎉" },
            { id: "star_42", seat: "42", name: "鐘蕓伸", wish: "畢業快樂🎉" }
        ];

        const pCount = graduationData.length; 

        const teacherSpeech = "⚡ [911 核心通訊已連接]...\n\n落子無悔，青春亦然。\n雖然只帶了你們短短半學期，\n但你們這群小棋手的智慧與活力，已經寫進了我的核心記憶體中。\n\n人生這場大棋局，難免會遇到困境或落後，\n但請記住，每一次被圍攻的 Bug，都是逼你們系統覺醒的優化契機。\n\n勇敢地去開創屬於你們自己的不敗定式吧！\n畢業快樂！\n\n—— 生科老師 柯承濰 \n——＠chengwei_2232 \n2026.06.09";

        // === 1. 初始化 3D 場景 ===
        const scene = new THREE.Scene();
        
        const textureLoader = new THREE.TextureLoader();
        textureLoader.load('daan.jpeg', function(texture) {
            if(blastStage === 0) scene.background = texture; 
        }, undefined, function(err) {
            if(blastStage === 0) scene.background = new THREE.Color(0x04040c);
        });

        scene.fog = new THREE.FogExp2(0x020206, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-stage'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ff9d, 2.5, 300);
        pointLight.position.set(0, 30, 0);
        scene.add(pointLight);

        // 圍棋棋盤地面
        function createGoBoardTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e2b26e'; ctx.fillRect(0, 0, 1024, 1024);
            ctx.strokeStyle = '#221100'; ctx.lineWidth = 3;
            const pad = 50; const step = (1024 - pad * 2) / 18;
            for(let i=0; i<19; i++) {
                ctx.beginPath(); ctx.moveTo(pad, pad + i*step); ctx.lineTo(1024-pad, pad + i*step); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pad + i*step, pad); ctx.lineTo(pad + i*step, 1024-pad); ctx.stroke();
            }
            ctx.fillStyle = '#221100'; const stars = [3, 9, 15];
            stars.forEach(r => { stars.forEach(c => { ctx.beginPath(); ctx.arc(pad + c*step, pad + r*step, 8, 0, Math.PI*2); ctx.fill(); }); });
            return new THREE.CanvasTexture(canvas);
        }

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(240, 240), new THREE.MeshStandardMaterial({ map: createGoBoardTexture(), roughness: 0.4 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const centerPlatform = new THREE.Mesh(new THREE.CylinderGeometry(7, 7, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0xff007f, emissive: 0xff007f, emissiveIntensity: 0.6 }));
        scene.add(centerPlatform);

        // 巨大棋子落下系統
        const goStones = [];
        const stoneCount = 100;
        const stoneGroup = new THREE.Group();
        scene.add(stoneGroup);

        const stoneGeo = new THREE.SphereGeometry(2.0, 32, 32); stoneGeo.scale(1, 0.4, 1);
        const blackStoneMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.1, metalness: 0.1 });
        const whiteStoneMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.15, metalness: 0.05 });

        for(let i=0; i<stoneCount; i++) {
            const isWhite = Math.random() > 0.5;
            const stoneMesh = new THREE.Mesh(stoneGeo, isWhite ? whiteStoneMat : blackStoneMat);
            stoneMesh.position.set((Math.random() - 0.5) * 200, Math.random() * 80 + 20, (Math.random() - 0.5) * 200);
            if(Math.abs(stoneMesh.position.x) < 20 && Math.abs(stoneMesh.position.z) < 20) stoneMesh.position.x += 40;
            stoneMesh.userData = { fallSpeed: Math.random() * 0.15 + 0.05, rotSpeedX: (Math.random() - 0.5) * 0.02, rotSpeedY: (Math.random() - 0.5) * 0.02 };
            stoneGroup.add(stoneMesh); goStones.push(stoneMesh);
        }

        function animateGoStones() {
            if (blastStage > 0) return;
            goStones.forEach(stone => {
                stone.position.y -= stone.userData.fallSpeed; stone.rotation.x += stone.userData.rotSpeedX; stone.rotation.y += stone.userData.rotSpeedY;
                if (stone.position.y < -2) {
                    stone.position.y = Math.random() * 40 + 80; stone.position.x = (Math.random() - 0.5) * 200; stone.position.z = (Math.random() - 0.5) * 200;
                }
            });
        }

        // === 2. 懸浮名字看板 Canvas 生產器 ===
        function createNameTag(text, colorHexStr) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(10, 10, 25, 0.65)';
            ctx.roundRect ? ctx.roundRect(10, 5, 236, 44, 20) : ctx.rect(10, 5, 236, 44);
            ctx.fill();
            ctx.font = 'bold 22px "Microsoft JhengHei", Arial, sans-serif';
            ctx.fillStyle = colorHexStr; ctx.textAlign = 'center';
            ctx.shadowColor = colorHexStr; ctx.shadowBlur = 8;
            ctx.fillText(text, 128, 33);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
            sprite.scale.set(4.5, 1.1, 1);
            return sprite;
        }

        // === 3. 3D 像素小人生成 ===
        function create3DHumanoid(color, isMe, nameText) {
            const group = new THREE.Group();
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 1.0), new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: isMe ? 0.4 : 0.1 }));
            head.position.y = 2.4;
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 0.8), new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.5 }));
            body.position.y = 1.4;
            group.add(head, body);

            const armMat = new THREE.MeshStandardMaterial({ color: color });
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), armMat); leftArm.position.set(-0.9, 1.4, 0);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), armMat); rightArm.position.set(0.9, 1.4, 0);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x111115 });
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.5), legMat); leftLeg.position.set(-0.4, 0.4, 0);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.5), legMat); rightLeg.position.set(0.4, 0.4, 0);
            group.add(leftArm, rightArm, leftLeg, rightLeg);

            const nameTag = createNameTag(nameText, isMe ? "#00ff9d" : "#ff007f");
            nameTag.position.y = 3.6;
            group.add(nameTag);
            return group;
        }

        const player = create3DHumanoid(0x00ff9d, true, myUsername);
        player.position.set((Math.random()-0.5)*10, 0, (Math.random()-0.5)*10);
        scene.add(player);

        // === 4. PubNub 多人同步通道 ===
        const myID = "911_" + Math.floor(Math.random() * 10000);
        const otherPlayers = {};

        const pubnub = new PubNub({
            publishKey: 'pub-c-e03f3224-0b05-434d-9cde-0d3b6f9fe21e', 
            subscribeKey: 'sub-c-f345f486-d14d-40b4-b8a7-168bc3d87fa9',
            userId: myID
        });

        pubnub.addListener({
            message: function(event) {
                const data = event.message;
                if (data.id !== myID && blastStage === 0) {
                    if (!otherPlayers[data.id]) {
                        const randomColor = Math.random() * 0xffffff;
                        otherPlayers[data.id] = create3DHumanoid(randomColor, false, data.name);
                        scene.add(otherPlayers[data.id]);
                    }
                    otherPlayers[data.id].position.set(data.x, data.y, data.z);
                    otherPlayers[data.id].rotation.y = data.ry;
                }
            },
            presence: function(event) {
                if ((event.action === 'leave' || event.action === 'timeout') && otherPlayers[event.uuid]) {
                    scene.remove(otherPlayers[event.uuid]); delete otherPlayers[event.uuid];
                }
            }
        });
        pubnub.subscribe({ channels: ['class_911_metaverse'], withPresence: true });

        document.getElementById('announcement').innerHTML = `歡迎 <b>${myUsername}</b> 進入911元宇宙空間<br>🌐 已建立 911 圍棋元宇宙安全連線...<br>按下 WASD 或 滑動搖桿 可以自由移動`;

        // === 5. 移動控制系統 ===
        const keys = { w:0, a:0, s:0, d:0 };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 1; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 0; });

        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        let moveDir = { x: 0, z: 0 };

        joystickZone.addEventListener('touchmove', (e) => {
            const rect = joystickZone.getBoundingClientRect(); const touch = e.touches[0];
            let fx = touch.clientX - (rect.left + 55); let fy = touch.clientY - (rect.top + 55);
            const dist = Math.sqrt(fx*fx + fy*fy);
            if(dist > 35) { fx = (fx/dist)*35; fy = (fy/dist)*35; }
            joystickStick.style.transform = `translate(${fx}px, ${fy}px)`;
            moveDir.x = fx / 35; moveDir.z = fy / 35;
        }, { passive: true });
        joystickZone.addEventListener('touchend', () => { joystickStick.style.transform = `translate(0px, 0px)`; moveDir = { x: 0, z: 0 }; });

        let lastBroadcast = 0;
        function updateMovement() {
            if (blastStage > 0) return;
            let isMoving = false; let targetRotation = player.rotation.y;

            if(keys.w) { player.position.z -= 0.35; targetRotation = Math.PI; isMoving = true; }
            if(keys.s) { player.position.z += 0.35; targetRotation = 0; isMoving = true; }
            if(keys.a) { player.position.x -= 0.35; targetRotation = -Math.PI/2; isMoving = true; }
            if(keys.d) { player.position.x += 0.35; targetRotation = Math.PI/2; isMoving = true; }
            
            if(moveDir.x !== 0 || moveDir.z !== 0) {
                player.position.x += moveDir.x * 0.35; player.position.z += moveDir.z * 0.35;
                targetRotation = Math.atan2(moveDir.x, moveDir.z); isMoving = true;
            }

            player.rotation.y = targetRotation;
            camera.position.set(player.position.x, player.position.y + 9, player.position.z + 16);
            camera.lookAt(player.position);

            const now = performance.now();
            if (isMoving && now - lastBroadcast > 50) {
                pubnub.publish({ channel: 'class_911_metaverse', message: { id: myID, name: myUsername, x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y } });
                lastBroadcast = now;
            }
        }

        // === 6. 排程時間與天色變黑遮罩系統 ===
        const targetTime = new Date("June 7, 2026 23:20:00").getTime(); 
        const duskStartTime = new Date("June 9, 2026 21:30:00").getTime();

        let blastStage = 0; 
        let fireworkParticles;
        let starSphereGroup = new THREE.Group(); scene.add(starSphereGroup);
        const spherePositions = []; const velocities = [];
        let gatherProgress = 0;

        function updateTimeline() {
            if (blastStage > 0) return;
            const now = new Date().getTime(); const distance = targetTime - now;

            if (now >= duskStartTime) {
                const totalDuskDuration = targetTime - duskStartTime;
                const darknessRatio = Math.min(((now - duskStartTime) / totalDuskDuration) * 0.92, 0.92);
                document.getElementById('sky-mask').style.background = `rgba(0, 0, 0, ${darknessRatio})`;
                ambientLight.intensity = 0.8 * (1 - darknessRatio);
            }

            if (distance <= 0) {
                document.getElementById('countdown').innerText = "00:00:00";
                triggerMemoryBlast();
                return;
            }

            const hours = Math.floor(distance / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerText = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
            
            // 🎯 倒數 15 秒自動切入滴答音效
            if (hours === 0 && minutes === 0 && distance <= 15000 && distance > 0) {
                if (!isTickingPlaying) {
                    isTickingPlaying = true;
                    if (isAudioPlaying) {
                        audioTicking.play().catch(e => console.log(e));
                        audioWorld.volume = 0.15; 
                    }
                }
            }
        }

        // 階段一：棋局大爆炸
        function triggerMemoryBlast() {
            if(blastStage > 0) return;
            blastStage = 1;
            
            if (isAudioPlaying) {
                audioWorld.pause(); audioTicking.pause();
                audioPiano.play().catch(e => console.log(e));
                updateAudioButtonUI(true);
            }

            document.getElementById('sky-mask').style.background = `rgba(0, 0, 0, 0)`;
            ambientLight.intensity = 0.4;
            scene.background = new THREE.Color(0x020206); 

            document.getElementById('timer-box').classList.add('hidden');
            document.getElementById('joystick-zone').classList.add('hidden');
            if(document.getElementById('test-btn')) document.getElementById('test-btn').classList.add('hidden');

            scene.remove(floor); scene.remove(centerPlatform); scene.remove(player); scene.remove(stoneGroup);
            for (let id in otherPlayers) { scene.remove(otherPlayers[id]); }

            camera.position.set(0, 22, 55); camera.lookAt(0, 18, 0);
            document.getElementById('announcement').innerHTML = "💥 【爆炸!】校園世界崩塌中...";

            const geom = new THREE.BufferGeometry(); const currentPositions = []; const colors = [];
            for (let i = 0; i < 600; i++) {
                currentPositions.push(0, 18, 0);
                velocities.push((Math.random() - 0.5) * 6.5, (Math.random() - 0.5) * 6.5, (Math.random() - 0.5) * 6.5);
                
                const radius = 22; const u = Math.random(); const v = Math.random();
                const theta = u * 2.0 * Math.PI; const phi = Math.acos(2.0 * v - 1.0);
                spherePositions.push(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta) + 18, radius * Math.cos(phi));
                colors.push(0.0, 1.0, 0.61); 
            }
            geom.setAttribute('position', new THREE.Float32BufferAttribute(currentPositions, 3));
            geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            fireworkParticles = new THREE.Points(geom, new THREE.PointsMaterial({ size: 0.9, vertexColors: true, transparent: true, opacity: 1.0 }));
            scene.add(fireworkParticles);

            setTimeout(() => {
                blastStage = 2;
                startTypewriterEffect();
            }, 1500);
        }

        // 階段二：打字機公告畫面
        function startTypewriterEffect() {
            const screen = document.getElementById('typewriter-screen');
            const textBox = document.getElementById('typewriter-text');
            screen.classList.remove('hidden');
            
            let index = 0; textBox.innerText = "";
            
            function type() {
                if (index < teacherSpeech.length) {
                    textBox.innerText += teacherSpeech.charAt(index);
                    index++;
                    setTimeout(type, 80); 
                } else {
                    setTimeout(() => {
                        screen.style.transition = "opacity 1s ease"; screen.style.opacity = 0;
                        setTimeout(() => {
                            screen.classList.add('hidden');
                            blastStage = 3; 
                            document.getElementById('announcement').innerHTML = "✨ 【重力引力逆轉】破碎的回憶正緩緩凝聚為星球...";
                        }, 1000);
                    }, 3500);
                }
            }
            type();
        }

        // 階段四：記憶星球高階互動
        const starMeshes = [];
        function buildMemorySphere() {
            blastStage = 4; 
            starSphereGroup.position.set(0, 18, 0);
            document.getElementById('announcement').innerHTML = "✨【911 記憶星球】凝聚重構成功！<br>👉 下方輸入『座號』或『姓名』，自動 3D 定位你的棋局回憶之星！";

            scene.background = new THREE.Color(0x020206);
            document.getElementById('sky-mask').style.background = `rgba(0, 0, 0, 0)`; 
            
            document.getElementById('timer-box').classList.add('hidden');
            document.getElementById('joystick-zone').classList.add('hidden');
            if(document.getElementById('test-btn')) document.getElementById('test-btn').classList.add('hidden');
            
            scene.remove(floor); scene.remove(centerPlatform); scene.remove(player); scene.remove(stoneGroup);
            for (let id in otherPlayers) { scene.remove(otherPlayers[id]); }

            document.getElementById('search-container').classList.remove('hidden');

            if (isAudioPlaying && audioPiano.paused) {
                audioPiano.play().catch(e => console.log(e));
            }

            graduationData.forEach((student, index) => {
                const idx = index * 3;
                const starGeo = new THREE.IcosahedronGeometry(0.7, 0); 
                const starMat = new THREE.MeshStandardMaterial({ color: 0x00ff9d, emissive: 0x00ff9d, emissiveIntensity: 0.8, roughness: 0.1 });
                const mesh = new THREE.Mesh(starGeo, starMat);
                mesh.position.set(spherePositions[idx], spherePositions[idx+1] - 18, spherePositions[idx+2]);
                mesh.userData = { studentInfo: student };
                starSphereGroup.add(mesh);
                starMeshes.push(mesh);
            });
            resetCamera();
        }

        function resetCamera() { camera.position.set(0, 18, 52); camera.lookAt(0, 18, 0); }

        let isTrackingCamera = false; let camTargetPos = new THREE.Vector3();

        function searchMyStar() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if(!query) return alert("請輸入座號或姓名！");

            const targetStar = starMeshes.find(star => {
                const info = star.userData.studentInfo;
                return info.seat.includes(query) || info.name.toLowerCase().includes(query);
            });

            if (targetStar) {
                const info = targetStar.userData.studentInfo;
                const worldPos = new THREE.Vector3();
                targetStar.getWorldPosition(worldPos);

                const direction = new THREE.Vector3().subVectors(worldPos, new THREE.Vector3(0, 18, 0)).normalize();
                camTargetPos.copy(worldPos).add(direction.multiplyScalar(10)); 

                targetStar.material.color.setHex(0xff007f); targetStar.material.emissive.setHex(0xff007f);
                targetStar.scale.set(2.5, 2.5, 2.5);
                isTrackingCamera = true; isUserInteracting = true; 

                setTimeout(() => {
                    alert(`🌟【911 ${info.seat} ${info.name} 的回憶結晶】🌟\n\n生科老師心裡話：\n${info.wish}`);
                    targetStar.scale.set(1, 1, 1); targetStar.material.color.setHex(0x00ff9d); targetStar.material.emissive.setHex(0x00ff9d);
                    isTrackingCamera = false; isUserInteracting = false; resetCamera();
                }, 1500); 
            } else { alert("找不到對應的同學！"); }
        }

        // 觸控拖曳
        let isDragging = false; let prevMousePosition = { x: 0, y: 0 }; let isUserInteracting = false;
        function dragStart(x, y) { if(isTrackingCamera) return; isDragging = true; prevMousePosition = { x, y }; }
        function dragMove(x, y) {
            if (!isDragging || blastStage !== 4) return;
            starSphereGroup.rotation.y += (x - prevMousePosition.x) * 0.005;
            starSphereGroup.rotation.x += (y - prevMousePosition.y) * 0.005;
            isUserInteracting = true; prevMousePosition = { x, y };
        }
        function dragEnd() { isDragging = false; setTimeout(() => { if(!isTrackingCamera) isUserInteracting = false; }, 2000); }

        window.addEventListener('mousedown', (e) => dragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => dragMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchstart', (e) => dragStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        window.addEventListener('touchmove', (e) => dragMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        window.addEventListener('touchend', dragEnd);

        const raycaster = new THREE.Raycaster();
        window.addEventListener('click', (e) => {
            if (blastStage !== 4 || isTrackingCamera || e.target.id === "search-input" || e.target.id === "search-btn") return;
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(starMeshes);
            if (intersects.length > 0) {
                document.getElementById('search-input').value = intersects[0].object.userData.studentInfo.seat;
                searchMyStar();
            }
        });

        // === 8. 動力學核心渲染 ===
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            updateTimeline();
            animateGoStones();

            if (blastStage === 1 && fireworkParticles) {
                const posArr = fireworkParticles.geometry.attributes.position.array;
                for (let i = 0; i < posArr.length / 3; i++) {
                    posArr[i*3] += velocities[i*3]; posArr[i*3+1] += velocities[i*3+1]; posArr[i*3+2] += velocities[i*3+2];
                    velocities[i*3] *= 0.96; velocities[i*3+1] *= 0.96; velocities[i*3+2] *= 0.96;
                }
                fireworkParticles.geometry.attributes.position.needsUpdate = true;
            }

            if (blastStage === 2 && fireworkParticles) {
                const posArr = fireworkParticles.geometry.attributes.position.array;
                for (let i = 0; i < posArr.length / 3; i++) {
                    posArr[i*3] += Math.sin(performance.now() * 0.001 + i) * 0.01;
                }
                fireworkParticles.geometry.attributes.position.needsUpdate = true;
            }

            if (blastStage === 3 && fireworkParticles) {
                const posArr = fireworkParticles.geometry.attributes.position.array;
                gatherProgress += 0.005; 
                for (let i = 0; i < posArr.length / 3; i++) {
                    const idx = i * 3;
                    posArr[idx] += (spherePositions[idx] - posArr[idx]) * 0.045;
                    posArr[idx+1] += (spherePositions[idx+1] - posArr[idx+1]) * 0.045;
                    posArr[idx+2] += (spherePositions[idx+2] - posArr[idx+2]) * 0.045;
                }
                fireworkParticles.geometry.attributes.position.needsUpdate = true;

                if(gatherProgress >= 1.0) {
                    scene.remove(fireworkParticles); buildMemorySphere();
                }
            }

            if (isTrackingCamera) {
                camera.position.lerp(camTargetPos, 0.08); camera.lookAt(0, 18, 0);
            }

            if (blastStage === 4 && !isUserInteracting) {
                starSphereGroup.rotation.y += 0.0025;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
