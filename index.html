<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>911 3D 大安元宇宙：終焉星河</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020206;
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            user-select: none; -webkit-user-select: none;
        }
        #webgl-stage {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        
        /* 核心黑科技：天色變黑動態遮罩層 (由倒數計時即時計算 opacity) */
        #sky-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; background: rgba(0, 0, 0, 0);
            pointer-events: none; /* 穿透點擊，不干擾 3D 控制 */
            transition: background 0.5s ease;
        }

        #ui-container {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            width: 90%; max-width: 600px; text-align: center;
        }
        .system-announcement {
            background: rgba(10, 10, 25, 0.85);
            border: 2px solid #00ff9d; color: #00ff9d;
            padding: 12px; font-weight: bold; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,255,157,0.3);
            margin-bottom: 10px; font-size: 14px;
            pointer-events: none;
        }
        .timer-box {
            background: rgba(0, 0, 0, 0.7); color: #fff;
            padding: 8px 15px; display: inline-block;
            border-radius: 20px; font-size: 14px; border: 1px solid #ff007f;
            pointer-events: none;
        }
        #countdown { font-weight: bold; color: #ff007f; text-shadow: 0 0 5px #ff007f; }
        
        /* 3D 星球搜尋終端機 UI */
        #search-container {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #00ff9d; padding: 10px 15px;
            border-radius: 30px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            display: flex; align-items: center; width: 85%; max-width: 400px;
        }
        #search-input {
            background: transparent; border: none; color: #fff;
            font-size: 16px; width: 100%; outline: none;
            padding: 5px; font-family: monospace;
        }
        #search-input::placeholder { color: rgba(0, 255, 157, 0.5); }
        #search-btn {
            background: #00ff9d; border: none; color: #000;
            padding: 8px 18px; border-radius: 20px; font-weight: bold;
            cursor: pointer; font-size: 14px; box-shadow: 0 0 10px #00ff9d;
            white-space: nowrap;
        }
        #search-btn:hover { background: #fff; box-shadow: 0 0 15px #00ff9d; }

        /* 手機版虛擬搖桿 */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 110px; height: 110px; background: rgba(255,255,255,0.08);
            border-radius: 50%; z-index: 10; border: 1px solid rgba(255,255,255,0.2);
            touch-action: none; display: block;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 40px; height: 40px; background: #00ff9d;
            border-radius: 50%; box-shadow: 0 0 12px #00ff9d;
        }
        
        .hidden { display: none !important; }
        
        /* 測試用手動引爆按鈕 */
        #test-btn {
            position: absolute; top: 180px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: #ff007f; color: #fff; border: none; 
            padding: 12px 25px; font-weight: bold; font-size: 16px;
            border-radius: 25px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px #ff007f;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
</head>
<body>

    <canvas id="webgl-stage"></canvas>
    
    <div id="sky-mask"></div>

    <button id="test-btn" onclick="triggerMemoryBlast()">💥 測試直接引爆（看煙火與星球）</button>

    <div id="ui-container">
        <div class="system-announcement" id="announcement">
            🌐 正在建立 911 大安元宇宙安全連線...
        </div>
        <div class="timer-box" id="timer-box">
            距離大安新大樓記憶爆炸還有：<span id="countdown">00:00:00</span>
        </div>
    </div>

    <div id="search-container" class="hidden">
        <input type="text" id="search-input" placeholder="輸入座號(如:26)或姓名定位星星...">
        <button id="search-btn" onclick="searchMyStar()">LOCATE</button>
    </div>

    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>

    <script>
        // === 0. 911 畢業班級名單與專屬祝福資料庫 ===
        const graduationData = [
            { id: "star_01", seat: "01", name: "王群叡", wish: "畢業快樂🎉" },
            { id: "star_03", seat: "03", name: "吳沁璇", wish: "畢業快樂🎉" },
            { id: "star_04", seat: "04", name: "洪可芸", wish: "畢業快樂🎉" },
            { id: "star_06", seat: "06", name: "陳俞瑾", wish: "畢業快樂🎉" },
            { id: "star_07", seat: "07", name: "陳晏秦", wish: "畢業快樂🎉" },
            { id: "star_08", seat: "08", name: "楊善茹", wish: "畢業快樂🎉" },
            { id: "star_21", seat: "21", name: "丁日初", wish: "畢業快樂🎉" },
            { id: "star_22", seat: "22", name: "王宥淵", wish: "畢業快樂🎉" },
            { id: "star_23", seat: "23", name: "李宣毅", wish: "畢業快樂🎉" },
            { id: "star_24", seat: "24", name: "林秉豫", wish: "畢業快樂🎉" },
            { id: "star_25", seat: "25", name: "吳少珷", wish: "畢業快樂🎉" },
            { id: "star_26", seat: "26", name: "林延宥", wish: "延宥！雖然只帶你半學期，但你的學習與吸收能力驚人。未來的路上保持這份自信，勇敢 Debug 你的人生藍圖吧！" },
            { id: "star_27", seat: "27", name: "徐亦祺", wish: "畢業快樂🎉" },
            { id: "star_28", seat: "28", name: "陳又嘉", wish: "畢業快樂🎉" },
            { id: "star_29", seat: "29", name: "陳品聿", wish: "畢業快樂🎉" },
            { id: "star_30", seat: "30", name: "陳彥希", wish: "畢業快樂🎉" },
            { id: "star_31", seat: "31", name: "陳楷育", wish: "畢業快樂🎉" },
            { id: "star_33", seat: "33", name: "陳俊穎", wish: "畢業快樂🎉" },
            { id: "star_34", seat: "34", name: "陳謙維", wish: "畢業快樂🎉" },
            { id: "star_35", seat: "35", name: "黃唯軒", wish: "畢業快樂🎉" },
            { id: "star_36", seat: "36", name: "梁普恩", wish: "畢業快樂🎉" },
            { id: "star_37", seat: "37", name: "許洺齊", wish: "洺齊！這段時間看見你的成長與轉變，老師真的很欣慰。記住，你的大腦核心處理器非常強大，相信自己，未來必定大放異彩！" },
            { id: "star_38", seat: "38", name: "蔡易辰", wish: "易辰！人生不要害怕遭遇 Compile Error，每一次的挫折與挑戰，都是讓你系統變得更完美的優化擴充。祝你未來一路順暢！" },
            { id: "star_39", seat: "39", name: "楊予寬", wish: "畢業快樂🎉" },
            { id: "star_40", seat: "40", name: "楊淞賁", wish: "畢業快樂🎉" },
            { id: "star_41", seat: "41", name: "劉品樂", wish: "畢業快樂🎉" },
            { id: "star_42", seat: "42", name: "鐘蕓伸", wish: "畢業快樂🎉" }
        ];

        const pCount = graduationData.length; 

        // === 1. 初始化 3D 場景 ===
        const scene = new THREE.Scene();
        
        // 核心修改：利用大安國中全新落成綜合教學大樓的真實影像當作背景貼圖！
        const textureLoader = new THREE.TextureLoader();
        // 這裡直接讀取上傳的大安新大樓模擬透視景觀照片
        textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/e/ec/Daan_Junior_High_School_New_Building.png', function(texture) {
            scene.background = texture; 
        }, undefined, function(err) {
            // 備用防掛機制：如果載入失敗，則呈現高質感夜空色
            scene.background = new THREE.Color(0x0e0e1a);
        });

        scene.fog = new THREE.FogExp2(0x020206, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-stage'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // 建立初始環境光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ff9d, 2, 300);
        pointLight.position.set(0, 25, 0);
        scene.add(pointLight);

        // 網格地面與大安圓台
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(240, 240), new THREE.MeshStandardMaterial({ color: 0x0c0c1a, roughness: 0.85 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const centerPlatform = new THREE.Mesh(new THREE.CylinderGeometry(7, 7, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0xff007f, emissive: 0xff007f, emissiveIntensity: 0.6 }));
        scene.add(centerPlatform);

        // === 2. 3D 像素小人生成演算法 ===
        function create3DHumanoid(color, isMe) {
            const group = new THREE.Group();
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 1.0), new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: isMe ? 0.4 : 0.1 }));
            head.position.y = 2.4;
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 0.8), new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.5 }));
            body.position.y = 1.4;
            group.add(head, body);

            const armMat = new THREE.MeshStandardMaterial({ color: color });
            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), armMat); leftArm.position.set(-0.9, 1.4, 0);
            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), armMat); rightArm.position.set(0.9, 1.4, 0);
            group.add(leftArm, rightArm);

            const legMat = new THREE.MeshStandardMaterial({ color: 0x111115 });
            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.5), legMat); leftLeg.position.set(-0.4, 0.4, 0);
            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.5), legMat); rightLeg.position.set(0.4, 0.4, 0);
            group.add(leftLeg, rightLeg);
            return group;
        }

        const player = create3DHumanoid(0x00ff9d, true);
        player.position.set((Math.random()-0.5)*30, 0, (Math.random()-0.5)*30);
        scene.add(player);

        // === 3. 911 專屬私密連線通道 (PubNub) ===
        const myID = "911_" + Math.floor(Math.random() * 10000);
        const otherPlayers = {};

        const pubnub = new PubNub({
            publishKey: 'pub-c-e03f3224-0b05-434d-9cde-0d3b6f9fe21e', 
            subscribeKey: 'sub-c-f345f486-d14d-40b4-b8a7-168bc3d87fa9',
            userId: myID
        });

        pubnub.addListener({
            message: function(event) {
                const data = event.message;
                if (data.id !== myID && blastStage === 0) {
                    if (!otherPlayers[data.id]) {
                        otherPlayers[data.id] = create3DHumanoid(Math.random() * 0xffffff, false);
                        scene.add(otherPlayers[data.id]);
                    }
                    otherPlayers[data.id].position.set(data.x, data.y, data.z);
                    otherPlayers[data.id].rotation.y = data.ry;
                }
            },
            presence: function(event) {
                if ((event.action === 'leave' || event.action === 'timeout') && otherPlayers[event.uuid]) {
                    scene.remove(otherPlayers[event.uuid]);
                    delete otherPlayers[event.uuid];
                }
            }
        });
        pubnub.subscribe({ channels: ['class_911_metaverse'], withPresence: true });

        document.getElementById('announcement').innerHTML = "🏫 歡迎來到大安國中 911 元宇宙空間！<br>使用 鍵盤WASD 或 虛擬搖桿 控制 3D 小人移動。";

        // === 4. 移動控制系統 ===
        const keys = { w:0, a:0, s:0, d:0 };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 1; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 0; });

        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        let moveDir = { x: 0, z: 0 };

        joystickZone.addEventListener('touchmove', (e) => {
            const rect = joystickZone.getBoundingClientRect();
            const touch = e.touches[0];
            let fx = touch.clientX - (rect.left + 55); let fy = touch.clientY - (rect.top + 55);
            const dist = Math.sqrt(fx*fx + fy*fy);
            if(dist > 35) { fx = (fx/dist)*35; fy = (fy/dist)*35; }
            joystickStick.style.transform = `translate(${fx}px, ${fy}px)`;
            moveDir.x = fx / 35; moveDir.z = fy / 35;
        }, { passive: true });

        joystickZone.addEventListener('touchend', () => { joystickStick.style.transform = `translate(0px, 0px)`; moveDir = { x: 0, z: 0 }; });

        let lastBroadcast = 0;
        function updateMovement() {
            if (blastStage > 0) return;
            let isMoving = false; let targetRotation = player.rotation.y;

            if(keys.w) { player.position.z -= 0.35; targetRotation = Math.PI; isMoving = true; }
            if(keys.s) { player.position.z += 0.35; targetRotation = 0; isMoving = true; }
            if(keys.a) { player.position.x -= 0.35; targetRotation = -Math.PI/2; isMoving = true; }
            if(keys.d) { player.position.x += 0.35; targetRotation = Math.PI/2; isMoving = true; }
            
            if(moveDir.x !== 0 || moveDir.z !== 0) {
                player.position.x += moveDir.x * 0.35; player.position.z += moveDir.z * 0.35;
                targetRotation = Math.atan2(moveDir.x, moveDir.z); isMoving = true;
            }

            player.rotation.y = targetRotation;
            camera.position.set(player.position.x, player.position.y + 9, player.position.z + 16);
            camera.lookAt(player.position);

            const now = performance.now();
            if (isMoving && now - lastBroadcast > 50) {
                pubnub.publish({ channel: 'class_911_metaverse', message: { id: myID, x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y } });
                lastBroadcast = now;
            }
        }

        // === 5. 核心修改：22:00 排程時間與「天色漸進黑幕遮罩演算法」 ===
        // 🚀 預計在今晚 22:00:00 準時大爆炸
        const targetTime = new Date("June 5, 2026 22:00:00").getTime(); 
        // 為了讓遮罩平滑，我們定義「黃昏變黑開始計算的起點時間」（例如爆炸前 1 小時，也就是 21:00）
        const duskStartTime = new Date("June 5, 2026 21:00:00").getTime();

        let blastStage = 0; let fireworkParticles;
        let starSphereGroup = new THREE.Group(); scene.add(starSphereGroup);
        const spherePositions = []; const velocities = [];
        let gatherProgress = 0;

        function updateTimeline() {
            if (blastStage > 0) return;
            const now = new Date().getTime(); 
            const distance = targetTime - now;

            // 🛠️ 核心黑科技：計算距離 22:00 的進度，驅動網頁天色逐漸變黑
            if (now >= duskStartTime) {
                const totalDuskDuration = targetTime - duskStartTime;
                const elapseddusk = now - duskStartTime;
                // 計算出 0 到 0.92 之間的暗度比率 (留下 0.08 讓底圖隱約可見，營造極致暴風雨前的寧靜)
                const darknessRatio = Math.min((elapseddusk / totalDuskDuration) * 0.92, 0.92);
                
                // 動態修正網頁 HTML 遮罩層
                document.getElementById('sky-mask').style.background = `rgba(0, 0, 0, ${darknessRatio})`;
                // 同步將 3D 環境光源調暗，小人身上也會折射出深夜的黑影
                ambientLight.intensity = 0.8 * (1 - darknessRatio);
            }

            if (distance <= 0) {
                document.getElementById('countdown').innerText = "00:00:00";
                triggerMemoryBlast();
                return;
            }

            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerText = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        }

        function triggerMemoryBlast() {
            if(blastStage > 0) return;
            blastStage = 1;
            
            // 爆炸瞬間：遮罩強制完全破除(0)，炸出亮眼的宇宙星河
            document.getElementById('sky-mask').style.background = `rgba(0, 0, 0, 0)`;
            ambientLight.intensity = 0.4;
            scene.background = new THREE.Color(0x020206); // 背景無縫切換成深邃宇宙

            document.getElementById('timer-box').classList.add('hidden');
            document.getElementById('joystick-zone').classList.add('hidden');
            if(document.getElementById('test-btn')) document.getElementById('test-btn').classList.add('hidden');

            scene.remove(floor); scene.remove(centerPlatform); scene.remove(player);
            for (let id in otherPlayers) { scene.remove(otherPlayers[id]); }

            camera.position.set(0, 22, 55);
            camera.lookAt(0, 18, 0);

            document.getElementById('announcement').innerHTML = "💥 【911 記憶大爆炸】大安新大樓數據正在重組凝聚...";

            const geom = new THREE.BufferGeometry(); const currentPositions = []; const colors = [];
            const particleDensity = 600;
            for (let i = 0; i < particleDensity; i++) {
                currentPositions.push(0, 18, 0);
                velocities.push((Math.random() - 0.5) * 6.5, (Math.random() - 0.5) * 6.5, (Math.random() - 0.5) * 6.5);
                
                const radius = 22; const u = Math.random(); const v = Math.random();
                const theta = u * 2.0 * Math.PI; const phi = Math.acos(2.0 * v - 1.0);
                
                spherePositions.push(
                    radius * Math.sin(phi) * Math.cos(theta), 
                    radius * Math.sin(phi) * Math.sin(theta) + 18, 
                    radius * Math.cos(phi)
                );
                colors.push(0.0, 1.0, 0.61); 
            }
            geom.setAttribute('position', new THREE.Float32BufferAttribute(currentPositions, 3));
            geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            fireworkParticles = new THREE.Points(geom, new THREE.PointsMaterial({ size: 0.9, vertexColors: true, transparent: true, opacity: 1.0 }));
            scene.add(fireworkParticles);

            setTimeout(() => {
                if(blastStage === 1) document.getElementById('announcement').innerHTML = "✨ 大安記憶原子受到引力逆轉，正在緩緩凝聚收縮中...";
            }, 1200);

            setTimeout(() => {
                blastStage = 2; 
                scene.remove(fireworkParticles); 
                buildMemorySphere();
                document.getElementById('search-container').classList.remove('hidden'); 
            }, 4500);
        }

        // === 6. 記憶星球高階互動系統 ===
        const starMeshes = [];
        function buildMemorySphere() {
            starSphereGroup.position.set(0, 18, 0);
            document.getElementById('announcement').innerHTML = "✨【911 記憶星球】凝聚重構成功！<br>👉 下方輸入『座號』或『姓名』，自動 3D 定位你的回憶之星！";

            graduationData.forEach((student, index) => {
                const idx = index * 3;
                const starGeo = new THREE.IcosahedronGeometry(0.7, 0); 
                const starMat = new THREE.MeshStandardMaterial({ color: 0x00ff9d, emissive: 0x00ff9d, emissiveIntensity: 0.8, roughness: 0.1 });
                const mesh = new THREE.Mesh(starGeo, starMat);
                mesh.position.set(spherePositions[idx], spherePositions[idx+1] - 18, spherePositions[idx+2]);
                
                mesh.userData = { studentInfo: student };
                starSphereGroup.add(mesh);
                starMeshes.push(mesh);
            });
            resetCamera();
        }

        function resetCamera() {
            camera.position.set(0, 18, 52);
            camera.lookAt(0, 18, 0);
        }

        // 3D 鏡頭自動追蹤定位
        let isTrackingCamera = false;
        let camTargetPos = new THREE.Vector3();

        function searchMyStar() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            if(!query) return alert("請輸入座號或姓名！");

            const targetStar = starMeshes.find(star => {
                const info = star.userData.studentInfo;
                return info.seat.includes(query) || info.name.toLowerCase().includes(query);
            });

            if (targetStar) {
                const info = targetStar.userData.studentInfo;
                const worldPos = new THREE.Vector3();
                targetStar.getWorldPosition(worldPos);

                const direction = new THREE.Vector3().subVectors(worldPos, new THREE.Vector3(0, 18, 0)).normalize();
                camTargetPos.copy(worldPos).add(direction.multiplyScalar(10)); 

                targetStar.material.color.setHex(0xff007f);
                targetStar.material.emissive.setHex(0xff007f);
                targetStar.scale.set(2.5, 2.5, 2.5);

                isTrackingCamera = true;
                isUserInteracting = true; 

                setTimeout(() => {
                    alert(`🌟【911 ${info.seat} ${info.name} 的回憶結晶】🌟\n\n資訊老師心裡話：\n${info.wish}`);
                    targetStar.scale.set(1, 1, 1);
                    targetStar.material.color.setHex(0x00ff9d);
                    targetStar.material.emissive.setHex(0x00ff9d);
                    isTrackingCamera = false;
                    isUserInteracting = false;
                    resetCamera();
                }, 1500); 

            } else {
                alert("找不到對應的同學，請檢查輸入是否正確（例如：26）");
            }
        }

        // 滑動旋轉控制
        let isDragging = false; let prevMousePosition = { x: 0, y: 0 }; let isUserInteracting = false;
        function dragStart(x, y) { if(isTrackingCamera) return; isDragging = true; prevMousePosition = { x, y }; }
        function dragMove(x, y) {
            if (!isDragging || blastStage !== 2) return;
            const deltaX = x - prevMousePosition.x;
            const deltaY = y - prevMousePosition.y;
            starSphereGroup.rotation.y += deltaX * 0.005;
            starSphereGroup.rotation.x += deltaY * 0.005;
            isUserInteracting = true; prevMousePosition = { x, y };
        }
        function dragEnd() { isDragging = false; setTimeout(() => { if(!isTrackingCamera) isUserInteracting = false; }, 2000); }

        window.addEventListener('mousedown', (e) => dragStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => dragMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchstart', (e) => dragStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        window.addEventListener('touchmove', (e) => dragMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        window.addEventListener('touchend', dragEnd);

        // 點擊星星支援
        window.addEventListener('click', (e) => {
            if (blastStage !== 2 || isTrackingCamera || e.target.id === "search-input" || e.target.id === "search-btn") return;
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(starMeshes);
            if (intersects.length > 0) {
                document.getElementById('search-input').value = intersects[0].object.userData.studentInfo.seat;
                searchMyStar();
            }
        });

        // === 7. 動力學渲染核心循環 ===
        function animate() {
            requestAnimationFrame(animate);
            updateMovement();
            updateTimeline();

            // 爆炸與緩緩凝聚物理插值公式
            if (blastStage === 1 && fireworkParticles) {
                const posArr = fireworkParticles.geometry.attributes.position.array;
                gatherProgress += 0.0045; 

                for (let i = 0; i < posArr.length / 3; i++) {
                    const idx = i * 3;
                    if (gatherProgress < 0.25) {
                        posArr[idx] += velocities[idx]; posArr[idx+1] += velocities[idx+1]; posArr[idx+2] += velocities[idx+2];
                        velocities[idx] *= 0.95; velocities[idx+1] *= 0.95; velocities[idx+2] *= 0.95;
                    } else {
                        posArr[idx] += (spherePositions[idx] - posArr[idx]) * 0.04;
                        posArr[idx+1] += (spherePositions[idx+1] - posArr[idx+1]) * 0.04;
                        posArr[idx+2] += (spherePositions[idx+2] - posArr[idx+2]) * 0.04;
                    }
                }
                fireworkParticles.geometry.attributes.position.needsUpdate = true;
            }

            if (isTrackingCamera) {
                camera.position.lerp(camTargetPos, 0.08); 
                camera.lookAt(0, 18, 0);
            }

            if (blastStage === 2 && !isUserInteracting) {
                starSphereGroup.rotation.y += 0.0025;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
